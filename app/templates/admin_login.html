{% extends "base.html" %}
{% block title %}Admin — The Chess Federation{% endblock %}

{% block content %}
<div class="login-box parchment-card">
  <h1>Enter the Inner Chamber</h1>
  <form method="post">
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autofocus>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%; margin-top:.5rem;">Enter</button>
  </form>
</div>
{% endblock %}
