{% macro avatar(user, size='md') %}
{% if user.avatar_filename %}
<img src="{{ url_for('static', filename='uploads/avatars/' + user.avatar_filename) }}"
     alt="{{ user.username }}" class="avatar avatar-{{ size }}">
{% else %}
<span class="avatar avatar-{{ size }} avatar-placeholder">{{ user.username[0]|upper }}</span>
{% endif %}
{% endmacro %}
