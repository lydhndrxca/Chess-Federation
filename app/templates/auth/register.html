{% extends "base.html" %}
{% block title %}Register — Chess Federation{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1>Join the Federation</h1>
        <form method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus
                       minlength="2" maxlength="30" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required
                       minlength="4" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="bio">Bio <span class="text-muted" style="font-weight:400">(optional)</span></label>
                <textarea id="bio" name="bio" class="form-textarea" rows="3"
                          maxlength="300" placeholder="A brief declaration of who you are…"></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>
        <p class="auth-link">Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
    </div>
</div>
{% endblock %}
